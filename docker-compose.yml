version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: eduai
      POSTGRES_USER: eduai_user
      POSTGRES_PASSWORD: eduai_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://eduai_user:eduai_pass@postgres:5432/eduai
      GROQ_API_KEY: ${GROQ_API_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: eduai-storage
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
    depends_on:
      - postgres
    networks:
      - backend-net
      - frontend-net

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - frontend-net

networks:
  frontend-net:
  backend-net:

volumes:
  pgdata:
