name: EduAI CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest
          python -m pytest tests/ -v || echo "No tests yet, skipping"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd frontend
          npm ci
          npm run build

  build-and-push:
    name: Build & Push ke ECR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build & push backend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/eduai-backend:${{ github.sha }} ./backend
          docker push ${{ env.ECR_REGISTRY }}/eduai-backend:${{ github.sha }}
          docker tag ${{ env.ECR_REGISTRY }}/eduai-backend:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-backend:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-backend:latest
      - name: Build & push frontend
        run: |
          docker build \
          -t ${{ env.ECR_REGISTRY }}/eduai-frontend:${{ github.sha }} ./frontend
          docker push ${{ env.ECR_REGISTRY }}/eduai-frontend:${{ github.sha }}
          docker tag ${{ env.ECR_REGISTRY }}/eduai-frontend:${{ github.sha }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-frontend:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-frontend:latest

  deploy-backend:
    name: Deploy Backend ke EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-1 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-backend:latest
            docker stop eduai-backend 2>/dev/null || true
            docker rm eduai-backend 2>/dev/null || true
            docker run -d \
              --name eduai-backend \
              --restart always \
              -p 8000:8000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}" \
              -e R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
              -e R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
              -e R2_ENDPOINT_URL="${{ secrets.R2_ENDPOINT_URL }}" \
              --network eduai-net \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-backend:latest
            sleep 10 && curl http://localhost:8000/health || true

  deploy-frontend:
    name: Deploy Frontend ke EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-1 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-frontend:latest
            docker stop eduai-frontend 2>/dev/null || true
            docker rm eduai-frontend 2>/dev/null || true
            docker run -d \
              --name eduai-frontend \
              --restart always \
              -p 80:80 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/eduai-frontend:latest
            sleep 10 && curl http://localhost:80 || true
